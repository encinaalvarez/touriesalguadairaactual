<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tour 360 - Recorrido</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #panorama { width: 100%; height: 100%; }
  </style>
</head>

<body>
  <div id="panorama"></div>

  <script>
    pannellum.viewer('panorama', {
      "default": {
        "firstScene": "azotea",      // ✅ escena inicial correcta
        "autoLoad": true,
        "showControls": true,
        "sceneFadeDuration": 900,
        "hotSpotDebug": true
      },

      "scenes": {
        "azotea": {
          "title": "Azotea",
          "type": "equirectangular",
          "panorama": "assets/scenes/azotea.jpg",
          "hotSpots": [
            { "pitch": -2, "yaw": 40, "type": "scene", "text": "Puerta → Azotea 1", "sceneId": "azotea1" }
          ]
        },

        "azotea1": {
          "title": "Azotea 1",
          "type": "equirectangular",
          "panorama": "assets/scenes/azotea1.jpg",
          "hotSpots": [
            { "pitch": -2, "yaw": -120, "type": "scene", "text": "← Volver (Azotea)", "sceneId": "azotea" },
            { "pitch": -2, "yaw": 60, "type": "scene", "text": "Puerta/Paso → Azotea 2", "sceneId": "azotea2" }
          ]
        },

        "azotea2": {
          "title": "Azotea 2",
          "type": "equirectangular",
          "panorama": "assets/scenes/azotea2.jpg",
          "hotSpots": [
            { "pitch": -2, "yaw": 180, "type": "scene", "text": "← Volver (Azotea 1)", "sceneId": "azotea1" }
          ]
        }
      }
    });
  </script>
</body>
</html>
